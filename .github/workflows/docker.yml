name: Build

on:
  push:
    branches:
      - master
      - dev

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x]
    runs-on: ${{ matrix.os }}
    env:
      FUTU_VERSION: 10.3.6308

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: npm install, build, and test
        run: |
          node -v
          npm -v
          npm install
          npm run build --if-present
          npm test
          npm run report:coverage
        env:
          CI: true

      # Set up QEMU for multi-platform builds
      - name: Set up QEMU
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub using Access Token
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      # Cache Docker layers (optional but recommended for faster builds)
      - name: Cache Docker layers
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Build and push Docker image for master
      - name: Build and push Docker image (master)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            felaray/futuopend:${{ env.FUTU_VERSION }}
            felaray/futuopend:latest
          platforms: linux/amd64
          build-args: |
            FUTU_VERSION=${{ env.FUTU_VERSION }}_Ubuntu18.04
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      # Build and push Docker image for dev
      - name: Build and push Docker image (dev)
        if: github.ref == 'refs/heads/dev'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            felaray/futuopend:${{ env.FUTU_VERSION }}-dev
            felaray/futuopend:dev-latest
          platforms: linux/amd64
          build-args: |
            FUTU_VERSION=${{ env.FUTU_VERSION }}_Ubuntu18.04
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
      # Move cache for future builds
      - name: Move cache
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev') && always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Skip docker build (non-target branch)
        if: github.ref != 'refs/heads/master' && github.ref != 'refs/heads/dev'
        run: echo "No Docker image build/push configured for this branch."
